name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write        # create the release and upload assets
  id-token: write        # OIDC token for Sigstore signing (provenance)
  attestations: write    # persist the attestation
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync PSScriptInfo version to tag
        # The tag is the single source of truth for the version. The .VERSION
        # in the committed file is a placeholder; stamp the tag (minus the
        # leading v) into it here so provenance, checksums, and the PSGallery
        # package all describe the same version.
        run: sed -i "s/^\.VERSION .*/.VERSION ${GITHUB_REF_NAME#v}/" timer-resolution-utility.ps1
      - name: Compute checksums
        run: sha256sum timer-resolution-utility.ps1 > SHA256SUMS.txt
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'timer-resolution-utility.ps1'
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes timer-resolution-utility.ps1 SHA256SUMS.txt
      - name: Publish to PowerShell Gallery
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: Publish-Script -Path ./timer-resolution-utility.ps1 -NuGetApiKey $env:NUGET_API_KEY
