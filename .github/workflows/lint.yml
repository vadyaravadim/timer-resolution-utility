name: lint
on: [push, pull_request]
jobs:
  psanalyzer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          $issues = Invoke-ScriptAnalyzer -Path . -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
          $issues | Format-Table Severity, RuleName, ScriptName, Line, Message -AutoSize -Wrap
          foreach ($i in $issues) {
              $lvl = if ($i.Severity -eq 'Error') { 'error' } else { 'warning' }
              "::$lvl file=$($i.ScriptName),line=$($i.Line)::[$($i.RuleName)] $($i.Message)"
          }
          if ($issues) { throw "PSScriptAnalyzer found $($issues.Count) issue(s)" }
