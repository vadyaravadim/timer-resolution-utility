# The script must stay pure ASCII with no BOM: a BOM breaks `irm | iex`
# (the parser chokes on a leading U+FEFF), and non-ASCII literals in a
# BOM-less file break -File runs under PowerShell 5.1. Use \uXXXX regex
# escapes for localized letters (see comments in the script).
name: ascii-check
on: [push, pull_request]
jobs:
  ascii:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          bad=$(perl -ne 'print "$.: $_" if /[^\x00-\x7F]/' timer-resolution-utility.ps1)
          if [ -n "$bad" ]; then
            echo "$bad"
            echo 'Non-ASCII bytes found: use \uXXXX regex escapes instead (see script comments)'
            exit 1
          fi
